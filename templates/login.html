<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Sistema Comedor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap.min.css') }}">
    <style>
        body { background: #f4f7f6; height: 100vh; display: flex; align-items: center; }
        .card-login { width: 400px; border: none; border-radius: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="card card-login shadow-lg p-4">
                <div class="text-center mb-4">
                    <h3 class="fw-bold">Acceso RH</h3>
                    <p class="text-muted small">Ingresa tus credenciales para continuar</p>
                </div>
                
                {% if error %}
                <div class="alert alert-danger small py-2">{{ error }}</div>
                {% endif %}

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Usuario</label>
                        <input type="text" name="username" class="form-control" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-bold">Contraseña</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-dark w-100 fw-bold py-2">Entrar al Panel</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
